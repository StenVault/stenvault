<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#020617"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#818CF8" stroke-width="1">
    <line x1="0" y1="0" x2="1200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(100, 165) scale(0.6)">
    <path d="M256 28L60 130v152c0 120 84 200 196 230 112-30 196-110 196-230V130L256 28z" fill="url(#accent)"/>
    <rect x="192" y="260" width="128" height="100" rx="12" fill="#020617" opacity="0.85"/>
    <path d="M208 260v-40a48 48 0 0 1 96 0v40" fill="none" stroke="#020617" stroke-width="20" stroke-linecap="round" opacity="0.85"/>
    <circle cx="256" cy="300" r="14" fill="#818CF8"/>
    <rect x="252" y="308" width="8" height="24" rx="4" fill="#818CF8"/>
  </g>

  <!-- Title -->
  <text x="420" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white">
    Sten<tspan fill="#818CF8">Vault</tspan>
  </text>

  <!-- Subtitle -->
  <text x="420" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#94A3B8">
    Encrypted Cloud Storage
  </text>

  <!-- Description -->
  <text x="420" y="380" font-family="system-ui, -apple-system, sans-serif" font-size="20" fill="#64748B">
    End-to-end encryption · Post-quantum cryptography · Zero knowledge
  </text>

  <!-- Bottom accent line -->
  <rect x="420" y="420" width="120" height="3" rx="1.5" fill="url(#accent)"/>

  <!-- Domain -->
  <text x="420" y="470" font-family="ui-monospace, monospace" font-size="18" fill="#475569" letter-spacing="2">
    stenvault.com
  </text>
</svg>
